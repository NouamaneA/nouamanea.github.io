description: I'm a Temporary Teaching and Research Fellow (ATER) at the [LIP6](https://www.lip6.fr/) lab - [Sorbonne University](https://www.sorbonne-universite.fr/). Prior to that, I was a PhD Student in Computer Science at the same lab. My current work focuses on developing influence-aware community detection algorithms for Online Social Networks. This means that I design algorithms that incorporate users' interactions to the network structure of social platforms to find opinion groups and influence propagation. I'm a member of the [Complex Networks](https://www.complexnetworks.fr/) research team at the LIP6.
